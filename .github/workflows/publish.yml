name: publish

on:
  # Auto-publish on merges to main when the publish-relevant surface changes
  # AND the version in package.json hasn't already been published. This makes
  # alpha refreshes a normal CI/CD outcome of merging a PR with a version bump,
  # rather than a separate manual step.
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "bin/**"
      - "package.json"
      # The workflow itself: a publish FIX merged to main should re-run the publish it fixes —
      # during the 2026-07 outage every repair needed a manual workflow_dispatch because this
      # file wasn't in its own trigger paths.
      - ".github/workflows/publish.yml"
  # Tagged release path stays for explicit version cuts.
  release:
    types: [published]
  # Manual dispatch stays for ad-hoc cases (e.g., re-publishing after a transient failure).
  workflow_dispatch:

jobs:
  publish:
    # ubuntu-latest, not the self-hosted minis: npm's OIDC trusted-publishing exchange only
    # runs on GitHub-hosted runners. This job is portable (bun install + lint/typecheck/test).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Trusted publishing (2026-07-03): GitHub mints a short-lived OIDC token asserting
      # "this is publish.yml on lambda-curry/anvil"; npm exchanges it for a minutes-lived
      # publish credential. No NPM_TOKEN secret exists anymore — nothing to expire or rotate
      # (the Apr-18 token's silent expiry killed the alpha.5 publish; this removes the class).
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `npm publish` is invoked directly below — setup-bun doesn't ship npm,
      # so install Node here.
      #
      # NO `registry-url:` — and an honest history, because the comment that first landed here
      # blamed it for the five red runs of 2026-07-09 and was WRONG about the mechanism. The
      # verified root cause was a STALE TRUSTED PUBLISHER BINDING: this repo was deleted and
      # recreated for the open-source cut, and npm's Trusted Publisher binds the original
      # repository — the npmjs.com UI kept showing the correct owner/repo string while the binding
      # underneath pointed at the dead repo. Publishing recovered only after Jake deleted and
      # re-added the Trusted Publisher (2026-07-13). npm attempts the OIDC exchange
      # unconditionally (per its own CLI source), token present or not.
      # What dropping `registry-url` DID do: setup-node writes an .npmrc with a dummy
      # NODE_AUTH_TOKEN placeholder, which disguised the real failure as `404 Not Found - PUT`
      # (npm's unauthorized). Without it the same failure reads as an honest ENEEDAUTH — so keep
      # registry-url out for signal quality, and if a 404/ENEEDAUTH ever returns here, check the
      # Trusted Publisher binding FIRST (especially after any repo rename/delete/recreate).
      - uses: actions/setup-node@v7
        with:
          node-version: 24

      # Trusted publishing needs npm >= 11.5.1 (the OIDC exchange lives in the CLI).
      # Pinned to the npm 11 line (2026-07-09): trusted publishing needs >= 11.5.1, but
      # `npm@latest` made the gate hostage to majors — npm 12.0.0 shipped day-one broken
      # (`Cannot find module 'sigstore'` inside libnpmpublish's provenance path) and killed
      # the alpha.6 publish. Bump deliberately after a new major has settled, never implicitly.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@11 && npm --version

      # Skip-if-already-published guard. Lets the merge trigger fire safely
      # on PRs that touch publish-relevant paths but don't bump the version
      # (e.g., script refactors that don't warrant a new alpha). When the
      # version is already on npm, exit cleanly instead of failing the run.
      - name: Check if version already published
        id: version_check
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@lambdacurry/anvil@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION already published. Nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION not yet published. Will publish after checks pass."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version_check.outputs.skip != 'true'
        run: bun install

      - name: Run lint
        if: steps.version_check.outputs.skip != 'true'
        run: bun run lint

      - name: Check formatting
        if: steps.version_check.outputs.skip != 'true'
        run: bun run format:check

      - name: Run typecheck
        if: steps.version_check.outputs.skip != 'true'
        run: bun run typecheck

      - name: Run tests
        if: steps.version_check.outputs.skip != 'true'
        run: bun test

      # Every publish moves `latest` (2026-07-09): the tool is alpha-only, and a stale `latest`
      # (it pointed at 0.1.0-alpha.1 for months) meant a bare `bunx @lambdacurry/anvil` handed
      # improvising testers an ancient build. Docs use bare commands (= latest) for general usage
      # and exact-pinned versions for the proof lane; the old floating `@alpha` tag is retired
      # (frozen at 0.1.0-alpha.5, no longer referenced anywhere). Trusted publishing can't run
      # `npm dist-tag add` (the OIDC credential only covers publish), so the tag set at publish
      # time IS the tag policy — which is exactly why `latest` must be the default here.
      - name: Determine npm tag
        if: steps.version_check.outputs.skip != 'true'
        id: npm_tag
        run: |
          # Explicit --tag latest: npm refuses an untagged PRERELEASE publish (its guard against
          # accidentally moving `latest`) — here moving `latest` is the deliberate policy.
          echo "tag=--tag latest" >> "$GITHUB_OUTPUT"

      # No token: trusted publishing authenticates via the job's OIDC identity
      # (configured on npmjs.com → @lambdacurry/anvil → Trusted Publisher).
      - name: Publish to npm
        if: steps.version_check.outputs.skip != 'true'
        run: npm publish --access public ${{ steps.npm_tag.outputs.tag }}
