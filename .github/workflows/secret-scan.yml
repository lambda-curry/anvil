name: secret-scan

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
 gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: 8.28.0
    steps:
      - uses: actions/checkout@v7

      - name: Install gitleaks
        run: |
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64) GITLEAKS_ASSET="linux_x64.tar.gz" ;;
            macOS-X64) GITLEAKS_ASSET="darwin_x64.tar.gz" ;;
            macOS-ARM64) GITLEAKS_ASSET="darwin_arm64.tar.gz" ;;
            *)
              echo "Unsupported runner platform: ${RUNNER_OS}-${RUNNER_ARCH}" >&2
              exit 1
              ;;
          esac

          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${GITLEAKS_ASSET}" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp
          chmod +x /tmp/gitleaks
          echo "/tmp" >> "$GITHUB_PATH"

      - name: Scan working tree for secrets
        run: gitleaks dir . --config .gitleaks.toml --no-banner --redact
